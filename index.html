  <script>
    var VIDEO_DURATION = 154; // 2min 34s em segundos
    var SHOW_BEFORE    = 60;  // aparecer 1 minuto antes
    var TRIGGER_AT     = VIDEO_DURATION - SHOW_BEFORE; // 94s após o play

    var buttonsShown = false;
    var timerStarted = false;
    var countdownTimer = null;
    var elapsed = 0;
    var tickInterval = null;

    function showButtons() {
      if (buttonsShown) return;
      buttonsShown = true;
      clearInterval(tickInterval);
      clearTimeout(countdownTimer);

      document.getElementById('divider').style.display = 'block';
      var btnMain      = document.getElementById('btn-main');
      var btnRecording = document.getElementById('btn-recording');

      btnMain.classList.add('visible');
      setTimeout(function () {
        btnRecording.style.opacity = '1';
        btnRecording.classList.add('visible');
      }, 180);
    }

    function startTimer() {
      if (timerStarted) return;
      timerStarted = true;

      // Timer principal: dispara em TRIGGER_AT segundos após o play
      countdownTimer = setTimeout(showButtons, TRIGGER_AT * 1000);

      // Tick a cada segundo para sincronia com pause/resume via postMessage
      tickInterval = setInterval(function() {
        elapsed++;
      }, 1000);
    }

    function pauseTimer() {
      clearInterval(tickInterval);
      clearTimeout(countdownTimer);
      // Recalcula o tempo restante ao pausar
      var remaining = Math.max(0, (TRIGGER_AT - elapsed)) * 1000;
      countdownTimer = null;
      tickInterval = null;
      // Guarda o tempo restante para resumir
      window._vturbRemaining = remaining;
    }

    function resumeTimer() {
      if (buttonsShown) return;
      var remaining = window._vturbRemaining !== undefined ? window._vturbRemaining : null;
      if (remaining === null) { startTimer(); return; }

      countdownTimer = setTimeout(showButtons, remaining);
      tickInterval = setInterval(function() { elapsed++; }, 1000);
    }

    // ── postMessage do VTurb ──
    window.addEventListener('message', function(event) {
      try {
        var data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
        if (!data) return;

        var evName = (
          data.event      || data.type      ||
          data.eventName  || data.action    ||
          data.playerEvent || ''
        ).toLowerCase();

        var inner = data.data || data.payload || {};
        var evSub = (inner.event || inner.type || inner.action || '').toLowerCase();
        var ev    = evName || evSub;

        // Início do vídeo → inicia o timer
        if (ev === 'play' || ev === 'playing' || ev === 'start' || ev === 'started') {
          startTimer();
        }

        // Pause → pausa o timer
        if (ev === 'pause' || ev === 'paused') {
          pauseTimer();
        }

        // Resume → retoma
        if (ev === 'resume' || ev === 'resumed' || ev === 'unpause') {
          resumeTimer();
        }

        // Ended → mostra imediatamente
        if (ev === 'ended' || ev === 'finish' || ev === 'complete' || ev === 'video:ended') {
          showButtons();
        }

        // timeupdate com currentTime real do player (mais preciso)
        var curTime = data.currentTime || inner.currentTime;
        if (curTime !== undefined && !buttonsShown) {
          if (!timerStarted) startTimer();
          if (curTime >= TRIGGER_AT) showButtons();
        }

      } catch(e) { /* ignore */ }
    });

    // ── SDK SmartPlayer: events customizados ──
    ['smartplayer:play','smartplayer:playing'].forEach(function(ev) {
      document.addEventListener(ev, startTimer);
    });
    ['smartplayer:ended','smartplayer:video:ended','vturb:ended'].forEach(function(ev) {
      document.addEventListener(ev, showButtons);
    });

    // ── Fallback: se o iframe carregar e não disparar play (autoplay) ──
    document.getElementById('ifr_6a31640c1b4ce87837468afc')
      .addEventListener('load', function() {
        // Espera 3s e inicia o timer caso o autoplay já tenha começado
        // sem disparar um evento de play capturável
        setTimeout(function() {
          if (!timerStarted) startTimer();
        }, 3000);
      });
  </script>
